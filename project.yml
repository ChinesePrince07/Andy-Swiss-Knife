name: AndySwissKnife
options:
  bundleIdPrefix: com.andyzhang
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"     # iPhone only
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

configFiles:
  Debug: Config/Secrets.xcconfig
  Release: Config/Secrets.xcconfig

targets:
  AndySwissKnife:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Schedule.swift
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Swiss Knife
        UILaunchStoryboardName: ""
        UIApplicationSupportsIndirectInputEvents: true
        UIRequiresFullScreen: true
        UIStatusBarStyle: UIStatusBarStyleDefault
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CANVAS_FEED_URL: "$(CANVAS_FEED_URL)"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.andyzhang.AndySwissKnife
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"

  AndySwissKnifeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
        excludes:
          - "Fixtures"
      - path: Tests/Fixtures
        buildPhase: resources
    dependencies:
      - target: AndySwissKnife
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.andyzhang.AndySwissKnifeTests
