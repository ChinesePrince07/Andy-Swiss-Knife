name: Publish iOS (OTA)

# Build, ad-hoc-sign, and publish Andy-Swiss-Knife to andypandy.org/apps so it
# installs over-the-air on the provisioned iPhone. Runs on a GitHub-hosted
# macOS runner (real Xcode → native codesign). The widget extension is stripped
# because the borrowed ad-hoc profile (explicit App ID nsk-596.v-team.cn) can't
# sign a second bundle id.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: publish-ios
  cancel-in-progress: true

jobs:
  build-sign-publish:
    runs-on: macos-15
    env:
      BUNDLE_ID: nsk-596.v-team.cn
      TEAM_ID: VCKAK49A49
      SLUG: andy-swiss-knife
      APP_TITLE: Andy Swiss Knife
      SITE: https://www.andypandy.org
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode (Swift 6 / project format 77 needs Xcode 16+)
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"

      - name: Install tooling
        run: brew install xcodegen yq

      - name: Strip widget extension + neutralize entitlements
        run: |
          set -euo pipefail
          # The borrowed profile is for one explicit App ID with no widget
          # profile — drop the widget target and the app's dependency on it.
          yq -i 'del(.targets.SwissKnifeWidgets)' project.yml
          yq -i 'del(.targets.AndySwissKnife.dependencies[] | select(.target == "SwissKnifeWidgets"))' project.yml
          # Empty entitlements: empty ⊆ any profile, so signing always validates
          # (sidesteps the group.com.andyzhang… vs group.nsk-596… mismatch).
          cat > ci-empty.entitlements <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict/></plist>
          PLIST

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Import signing assets
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_MOBILEPROVISION_BASE64: ${{ secrets.IOS_MOBILEPROVISION_BASE64 }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KCPASS="$(openssl rand -base64 24)"

          security create-keychain -p "$KCPASS" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KCPASS" "$KEYCHAIN"

          echo "$IOS_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$IOS_P12_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KCPASS" "$KEYCHAIN" >/dev/null
          # Make our keychain visible to codesign alongside the default ones.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/"//g')

          # Install the provisioning profile under its real UUID; read its Name.
          echo "$IOS_MOBILEPROVISION_BASE64" | base64 --decode > "$RUNNER_TEMP/pp.mobileprovision"
          PP_PLIST="$(security cms -D -i "$RUNNER_TEMP/pp.mobileprovision")"
          PP_UUID="$(/usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin <<<"$PP_PLIST")"
          PP_NAME="$(/usr/libexec/PlistBuddy -c 'Print :Name' /dev/stdin <<<"$PP_PLIST")"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$RUNNER_TEMP/pp.mobileprovision" "$HOME/Library/MobileDevice/Provisioning Profiles/$PP_UUID.mobileprovision"

          # The code-signing identity name, read straight from the keychain.
          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN" | awk -F'"' 'NR==1{print $2}')"

          {
            echo "KEYCHAIN=$KEYCHAIN"
            echo "PP_UUID=$PP_UUID"
            echo "PP_NAME=$PP_NAME"
            echo "SIGN_IDENTITY=$IDENTITY"
          } >> "$GITHUB_ENV"
          echo "Using identity: $IDENTITY / profile: $PP_NAME ($PP_UUID)"

      - name: Archive & export signed IPA
        run: |
          set -euo pipefail
          ARCHIVE="$RUNNER_TEMP/app.xcarchive"
          EXPORT="$RUNNER_TEMP/export"
          mkdir -p "$EXPORT"

          xcodebuild archive \
            -project AndySwissKnife.xcodeproj -scheme AndySwissKnife \
            -configuration Release -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_IDENTITY="$SIGN_IDENTITY" \
            PROVISIONING_PROFILE_SPECIFIER="$PP_NAME" \
            CODE_SIGN_ENTITLEMENTS="$PWD/ci-empty.entitlements" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN"

          cat > "$EXPORT/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>release-testing</string>
            <key>signingStyle</key><string>manual</string>
            <key>teamID</key><string>$TEAM_ID</string>
            <key>stripSwiftSymbols</key><true/>
            <key>compileBitcode</key><false/>
            <key>signingCertificate</key><string>$SIGN_IDENTITY</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$BUNDLE_ID</key><string>$PP_NAME</string>
            </dict>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive -archivePath "$ARCHIVE" \
            -exportPath "$EXPORT" -exportOptionsPlist "$EXPORT/ExportOptions.plist" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN"

          IPA="$(ls "$EXPORT"/*.ipa | head -1)"
          INFO="$ARCHIVE/Products/Applications/$(ls "$ARCHIVE/Products/Applications" | head -1)/Info.plist"
          {
            echo "IPA=$IPA"
            echo "APP_VERSION=$(/usr/libexec/PlistBuddy -c 'Print CFBundleShortVersionString' "$INFO")"
            echo "APP_BUILD=$(/usr/libexec/PlistBuddy -c 'Print CFBundleVersion' "$INFO")"
            echo "IPA_SIZE=$(stat -f%z "$IPA")"
          } >> "$GITHUB_ENV"
          echo "Built IPA: $IPA"

      - name: Publish to andypandy.org/apps
        env:
          IOS_UPLOAD_TOKEN: ${{ secrets.IOS_UPLOAD_TOKEN }}
        run: |
          set -euo pipefail
          PRESIGN_BODY="$(SLUG="$SLUG" python3 -c 'import json,os; print(json.dumps({"slug":os.environ["SLUG"],"ipaContentType":"application/octet-stream"}))')"
          PRESIGN="$(curl -fsSL -X POST "$SITE/api/admin/ios/upload" \
            -H "Authorization: Bearer $IOS_UPLOAD_TOKEN" -H 'Content-Type: application/json' \
            -d "$PRESIGN_BODY")"
          IPA_URL="$(echo "$PRESIGN" | python3 -c 'import sys,json; print(json.load(sys.stdin)["ipaUploadUrl"])')"

          echo "Uploading .ipa…"
          curl -fsS -X PUT "$IPA_URL" -H 'Content-Type: application/octet-stream' --data-binary @"$IPA" >/dev/null

          echo "Registering build…"
          REGISTER_BODY="$(SLUG="$SLUG" APP_TITLE="$APP_TITLE" BUNDLE_ID="$BUNDLE_ID" APP_VERSION="$APP_VERSION" APP_BUILD="$APP_BUILD" IPA_SIZE="$IPA_SIZE" python3 -c '
          import json, os
          print(json.dumps({
              "slug": os.environ["SLUG"],
              "appName": os.environ["APP_TITLE"],
              "bundleId": os.environ["BUNDLE_ID"],
              "version": os.environ["APP_VERSION"],
              "build": os.environ["APP_BUILD"],
              "sizeBytes": int(os.environ["IPA_SIZE"]),
              "hasIcon": False,
          }))')"
          RESP="$(curl -fsSL -X POST "$SITE/api/admin/ios/register" \
            -H "Authorization: Bearer $IOS_UPLOAD_TOKEN" -H 'Content-Type: application/json' \
            -d "$REGISTER_BODY")" || { echo "Register failed: $RESP"; exit 1; }
          echo "Published: $RESP"
          echo "Install at $SITE/apps (open in Safari on your iPhone)."
