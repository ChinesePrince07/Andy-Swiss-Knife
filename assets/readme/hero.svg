<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="390" viewBox="0 0 1200 390" role="img" aria-labelledby="title desc">
  <title id="title">Andy's Swiss Knife</title>
  <desc id="desc">A brutalist school dashboard made from schedule, task, meal, focus, and file modules.</desc>
  <rect width="1200" height="390" fill="#FAF5EB"/>
  <rect x="24" y="24" width="1152" height="342" fill="#FFFFFF" stroke="#111111" stroke-width="4"/>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#111111">
    <text x="58" y="70" font-size="18" font-weight="700" letter-spacing="4">IOS 17+ / PERSONAL SCHOOL OS</text>
    <text x="56" y="150" font-size="65" font-weight="900">ANDY'S</text>
    <text x="56" y="218" font-size="65" font-weight="900">SWISS KNIFE</text>
    <rect x="56" y="246" width="112" height="10" fill="#EF341E"/>
    <text x="56" y="298" font-size="23" font-weight="700">THE WHOLE SCHOOL DAY.</text>
    <text x="56" y="330" font-size="23">ONE SHARP DASHBOARD.</text>
  </g>
  <g transform="translate(665 50)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#111111">
