    <g transform="translate(18 68)">
      <rect width="196" height="86" fill="#FFFFFF" stroke="#111111" stroke-width="3"/>
      <text x="14" y="26" font-size="16" font-weight="800">NEXT CLASS</text>
      <text x="14" y="58" font-size="24" font-weight="900">PHYSICS</text>
      <rect y="75" width="196" height="11" fill="#EF341E"/>
    </g>
    <g transform="translate(238 68)">
      <rect width="198" height="86" fill="#FFFFFF" stroke="#111111" stroke-width="3"/>
      <text x="14" y="26" font-size="16" font-weight="800">TASKS</text>
      <text x="14" y="59" font-size="29" font-weight="900">03 OPEN</text>
    </g>
    <g transform="translate(18 172)">
