      <text x="12" y="58" font-size="25" font-weight="900">25:00</text>
    </g>
    <g transform="translate(310 172)">
      <rect width="126" height="86" fill="#FFFFFF" stroke="#111111" stroke-width="3"/>
      <text x="12" y="25" font-size="15" font-weight="800">FILES</text>
      <text x="12" y="58" font-size="24" font-weight="900">SYNC</text>
